name: Seed database

on:
  workflow_dispatch:

jobs:
  migrate-database:
    runs-on: ubuntu-latest
    name: Seed database
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: '.tool-versions'
          cache: npm
      - name: Restore cache
        uses: actions/cache@v5
        with:
          path: |
            .next/cache
          # Generate a new cache whenever packages or source files change.
          key: ${{ runner.os }}-frontend-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**.[jt]s', '**.[jt]sx') }}
          # If source files changed but packages didn't, rebuild from a prior cache.
          restore-keys: |
            ${{ runner.os }}-frontend-${{ hashFiles('**/package-lock.json') }}-

      - name: Install dependencies
        run: npm ci

      - name: Run seed
        # Because we do not use seed tracking, all scripts in /seeds are re-executed everytime we manually run this action
        run: npm run db:run-seed
